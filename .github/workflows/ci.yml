name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore E2ETest.sln
      - name: Build
        run: dotnet build E2ETest.sln -c Release --no-restore
      - name: Unit tests
        run: dotnet test tests/E2ETest.Tests/E2ETest.Tests.csproj -c Release --no-build --verbosity normal
